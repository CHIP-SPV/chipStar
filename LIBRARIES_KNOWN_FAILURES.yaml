library_known_failures:

  rocPRIM:
    backend: LEVEL0_GPU
    platform: x86_64 Linux, LLVM 22.0-native
    failures:
      block_sort_merge:
        reason: "Block sort using merge algorithm hangs (300s timeout)"
        source: "Subgroup shuffle/ballot operations used by merge-based sort not functional; known chipStar limitation with sub_group_shuffle_* in SPIR-V"
      block_sort_merge_stable:
        reason: "Stable block merge sort hangs (300s timeout)"
        source: "Same as block_sort_merge — subgroup shuffle operations"
      block_sort_bitonic:
        reason: "Bitonic block sort hangs (300s timeout)"
        source: "Bitonic sort uses sub_group_shuffle_xor; SPIR-V OpGroupNonUniformShuffleXor not working correctly on Intel Arc via Level0"
      device_radix_sort:
        reason: "Device radix sort hangs (300s timeout)"
        source: "Radix sort uses block_radix_sort internally; subgroup ballot/shuffle operations cause hang"
      device_segmented_radix_sort:
        reason: "Device segmented radix sort hangs (300s timeout)"
        source: "Same as device_radix_sort"
      warp_reduce:
        reason: "WarpReduceTests with __half fail: ReduceSum gives wrong results for warp_params<__half, 4> and warp_params<__half, 8>"
        source: "__half warp reduction produces incorrect results; likely half-precision arithmetic or subgroup reduction not handling fp16 correctly in SPIR-V on Intel Arc"
      warp_scan:
        reason: "Warp scan tests fail with numerical errors"
        source: "Subgroup scan operations; similar to warp_reduce root cause"
      block_radix_rank:
        reason: "Block radix rank fails"
        source: "Uses subgroup operations (sub_group_ballot, sub_group_shuffle); not correctly emitted for Intel Arc Level0"
      block_radix_sort:
        reason: "Block radix sort fails"
        source: "Depends on block_radix_rank; same root cause"
      block_reduce:
        reason: "Block reduce fails for some type/size combinations"
        source: "Uses subgroup reduce operations; SPIR-V OpGroupNonUniformFAdd/IAdd may produce wrong results for certain warp widths"
      block_scan:
        reason: "Block scan fails for some type/size combinations"
        source: "Subgroup scan operations; same root cause as block_reduce"
      device_reduce:
        reason: "ReduceArgMinimum/ReduceArgMaximum return 0 instead of correct index; ReduceSum fails for short types"
        source: "KeyValuePair<int, T> comparison in argmin/argmax uses 64-bit struct loads that may not be correctly handled by SPIR-V code generation; short (i16) arithmetic issue"
      device_reduce_by_key:
        reason: "Device reduce-by-key fails"
        source: "Same as device_reduce — KeyValuePair struct operations"
      device_partition:
        reason: "Device partition fails"
        source: "Partition uses device_scan internally; scan failures propagate"
      device_select:
