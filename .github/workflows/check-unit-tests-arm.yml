# Workflow syntax:
# https://help.github.com/en/articles/workflow-syntax-for-github-actions

on:
  pull_request:
    paths-ignore: "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests-llvm-18-release-salami:
    runs-on: [self-hosted, Linux, ARM64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run:  ./scripts/unit_tests.sh release llvm-21
        shell: bash

  # chipFFT + chipBLAS positive verification on Linux ARM64 (salami, Mali-G52
  # via OpenCL). No Level Zero on this host, so the OpenCL/CLBlast and
  # OpenCL/VkFFT path is the right implementation here.
  chipfft-chipblas-salami:
    runs-on: [self-hosted, Linux, ARM64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install + test chipFFT and chipBLAS (OpenCL)
        shell: bash
        run: |
          set -e
          export MODULESHOME=$HOME/.local
          source $MODULESHOME/init/bash 2>/dev/null || source /etc/profile.d/modules.sh
          module use ~/modulefiles
          module load llvm/21.0
          module list

          export LLVM_DIR=$(module show llvm/21.0 2>&1 | grep -E 'prepend-path\s+PATH' | awk '{print $NF}' | head -1 | xargs dirname)
          echo "LLVM_DIR=$LLVM_DIR"

          STAGING=${{ runner.temp }}/chipfft-chipblas-staging-${{ github.event.pull_request.number || github.sha }}
          rm -rf $STAGING

          ./install_chipstar.py -c chipfft,chipblas \
            --with-tests \
            --install-dir $STAGING \
            --staging-dir $STAGING/staging \
            -j $(nproc)

          CHIP_INSTALL=$(ls -d $STAGING/chipStar/*/ | head -1)
          export PATH=$CHIP_INSTALL/bin:$PATH
          export LD_LIBRARY_PATH=$CHIP_INSTALL/lib:${LD_LIBRARY_PATH:-}
          export HIP_PATH=$CHIP_INSTALL
          export HIP_PLATFORM=spirv
          export CHIP_LOGLEVEL=err

          failed=0
          for lib in chipFFT chipBLAS; do
            BUILD=$STAGING/staging/$lib/build
            if [ ! -f "$BUILD/CTestTestfile.cmake" ]; then
              echo "::error::$lib build directory missing or unconfigured: $BUILD"
              failed=$((failed+1))
              continue
            fi
            echo "=== Testing $lib ==="
            (cd "$BUILD" && ctest --output-on-failure --timeout 1800) || failed=$((failed+1))
          done
          if [ $failed -gt 0 ]; then
            echo "::error::$failed library test suites failed on salami"
            exit 1
          fi
        timeout-minutes: 90

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: chipfft-chipblas-salami-logs
          path: |
            ${{ runner.temp }}/chipfft-chipblas-staging-*/staging/*/build/Testing/**/LastTest*.log
          if-no-files-found: ignore
