name: x86 Intel GPU CI

on:
  pull_request:
    paths-ignore: "docs/**"

concurrency:
  group: meatloaf-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Quick gate: assert install_chipstar.py refuses chipfft/chipblas on Level Zero
  refuse-chipfft-chipblas-on-level-zero:
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Assert install_chipstar.py refuses chipfft/chipblas on Level Zero host
        shell: bash
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native level-zero/dgpu

          OUT=$(mktemp)
          set +e
          ./install_chipstar.py -c chipfft,chipblas --dry-run > "$OUT" 2>&1
          rc=$?
          set -e
          echo "--- installer output (rc=$rc) ---"
          cat "$OUT"
          echo "--- end output ---"

          if [ "$rc" -eq 0 ]; then
            echo "::error::installer succeeded; expected refusal on Level Zero host"
            exit 1
          fi
          if ! grep -q "Level Zero was detected" "$OUT"; then
            echo "::error::installer did not print the expected Level Zero refusal message"
            exit 1
          fi
          if ! grep -q "Refusing to install: .*chipfft" "$OUT"; then
            echo "::error::installer did not list chipfft in refusal"
            exit 1
          fi
          if ! grep -q "Refusing to install: .*chipblas" "$OUT"; then
            echo "::error::installer did not list chipblas in refusal"
            exit 1
          fi
          echo "OK: refused as expected"

  # Stage 1: Build and test chipStar with latest LLVM native
  chipstar-llvm22-native-release:
    needs: refuse-chipfft-chipblas-on-level-zero
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh release llvm-22 --variant=native
        shell: bash

  # Stage 2: Build chipStar + all libraries, run library tests
  build-and-test-libraries:
    needs: chipstar-llvm22-native-release
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build chipStar + all libraries
        shell: bash
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native level-zero/dgpu
          module list

          # rocSPARSE/hipSPARSE clients/tests require GTest >= 1.11; it lives
          # in the meatloaf miniconda env. Login shells activate it, but GH
          # Actions runs non-login, so put it on CMAKE_PREFIX_PATH explicitly.
          export CMAKE_PREFIX_PATH="/home/pvelesko/miniconda3:${CMAKE_PREFIX_PATH:-}"

          STAGING=/tmp/chipstar-ci-staging/${{ github.event.pull_request.number }}
          rm -rf $STAGING

          ./install_chipstar.py --all \
            --with-tests \
            --install-dir $STAGING \
            --staging-dir $STAGING/staging \
            -j 8

          echo "STAGING=$STAGING" >> $GITHUB_ENV

      - name: Run library tests
        shell: bash
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native level-zero/dgpu

          # Find the chipStar install (date-stamped subdir)
          CHIP_INSTALL=$(ls -d $STAGING/chipStar/*/ | head -1)
          export PATH=$CHIP_INSTALL/bin:$PATH
          export LD_LIBRARY_PATH=$CHIP_INSTALL/lib:${LD_LIBRARY_PATH:-}
          export HIP_PATH=$CHIP_INSTALL
          export HIP_PLATFORM=spirv
          export CHIP_LOGLEVEL=err
          # Enable IGC software fp64 emulation on Intel Arc (Alchemist lacks native fp64)
          export IGC_EnableDPEmulation=1
          export OverrideDefaultFP64Settings=1

          # h4i-mklshim_batch_correctness_test SEGFAULTs on Intel Arc A380 and
          # causes ZE_RESULT_ERROR_DEVICE_LOST in subsequent tests. Root cause
          # is a crash in MKL batch LAPACK on this GPU. Exclude until fixed in
          # the H4I-MKLShim upstream.
          mkdir -p $STAGING/staging/H4I-MKLShim/.ci
          echo "h4i-mklshim_batch_correctness_test" \
            > $STAGING/staging/H4I-MKLShim/.ci/exclude.txt

          # hipfft_missing_symbols runs a 1D D2Z/Z2D round-trip then asserts
          # PASSED in stdout. On Arc A380 with IGC DP emulation the inverse
          # transform comes back numerically off (e.g. got -0.3125, expected
          # -5) and the test fails. Tracking; not in the IGC-drop class this
          # CI is here to gate on.
          mkdir -p $STAGING/staging/H4I-HipFFT/.ci
          echo "^hipfft_missing_symbols$" \
            > $STAGING/staging/H4I-HipFFT/.ci/exclude.txt

          # hipCUB tests with known chipStar/Intel-Arc issues. Each entry has a
          # one-line failure hypothesis; tracked for later root-cause work in
          # the chipStar TODO board. Anchored regexes so we don't accidentally
          # mask new tests.
          mkdir -p $STAGING/staging/hipCUB/.ci
          {
            # Subprocess aborted on Arc A380; suspected IGC SPIR-V compile bug.
            echo "^hipcub\.DevicePartition$"
            # cached_blocks.size() expected 1 got 0; chipStar stream-aware
            # caching reuses block cross-stream instead of re-caching on free.
            echo "^hipcub\.CachingDeviceAllocator$"
            # hipErrorTbd 'Module is null after compilation' (Level0); SPIR-V
            # module build fails for a BlockRadixRank kernel.
            echo "^hipcub\.BlockRadixRank$"
            # Numerical mismatch in histogram output; suspected atomic / thread
            # layout divergence on Arc A380.
            echo "^hipcub\.DeviceHistogram$"
            # hipErrorOutOfMemory 'Allocation size exceeds limits for a single
            # allocation'; test buffer > Level0 single-alloc max on Arc A380.
            echo "^hipcub\.DeviceRadixSort$"
            # hipErrorLaunchFailure: getKernelByName can't find the rocprim
            # run_length_encode_non_trivial_runs kernel; symbol/mangling
            # mismatch between rocPRIM and chipStar's kernel lookup.
            echo "^hipcub\.DeviceRunLengthEncode$"
            # Same getKernelByName miss for rocprim reduce_by_key kernel.
            echo "^hipcub\.DeviceReduceByKey$"
            # 1800s ctest timeout; segmented radix sort kernel hangs or runs
            # extremely slowly on Arc A380.
            echo "^hipcub\.DeviceSegmentedRadixSort$"
            # hipErrorNotSupported from hipOccupancyMaxActiveBlocksPerMulti-
            # processor; the API is not implemented in chipStar.
            echo "^hipcub\.Grid$"
          } > $STAGING/staging/hipCUB/.ci/exclude.txt

          failed=0
          for lib_staging in $STAGING/staging/*/; do
            lib=$(basename $lib_staging)
            lib_build="$lib_staging/build"
            if [ ! -d "$lib_build" ]; then
              continue
            fi
            if [ -f "$lib_build/CTestTestfile.cmake" ]; then
              echo "=== Testing $lib ==="
              exclude=""
              exclude_file="$lib_staging/.ci/exclude.txt"
              if [ -f "$exclude_file" ]; then
                exclude=$(grep -Ev '^\s*(#|$)' "$exclude_file" | paste -sd '|' - || true)
              fi
              labels=""
              labels_file="$lib_staging/.ci/ctest-labels.txt"
              if [ -f "$labels_file" ]; then
                labels=$(grep -Ev '^\s*(#|$)' "$labels_file" | paste -sd '|' - || true)
              fi
              cd "$lib_build"
              if ! ctest --output-on-failure --timeout 1800 ${labels:+-L "$labels"} ${exclude:+-E "$exclude"}; then
                echo "::warning::$lib tests had failures"
                failed=$((failed + 1))
              fi
            else
              echo "=== $lib: no CTest tests ==="
            fi
          done
          if [ $failed -gt 0 ]; then
            echo "::error::$failed libraries had test failures"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: library-test-logs
          path: |
            /tmp/chipstar-ci-staging/${{ github.event.pull_request.number }}/staging/*/build/Testing/**/LastTest*.log
          if-no-files-found: ignore

  # Stage 3: Build and test libCEED
  build-and-test-libceed:
    needs: build-and-test-libraries
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build and test libCEED
        shell: bash
        timeout-minutes: 30
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native level-zero/dgpu

          STAGING=/tmp/chipstar-ci-staging/${{ github.event.pull_request.number }}
          CHIP_INSTALL=$(ls -d $STAGING/chipStar/*/ | head -1)
          export PATH=$CHIP_INSTALL/bin:$PATH
          export LD_LIBRARY_PATH=$CHIP_INSTALL/lib:${LD_LIBRARY_PATH:-}
          export HIP_PATH=$CHIP_INSTALL
          export HIP_PLATFORM=spirv
          export IGC_EnableDPEmulation=1
          export OverrideDefaultFP64Settings=1
          # libCEED's Makefile only enables the HIP backend when ROCM_DIR
          # points at a prefix containing hipconfig + libCHIP.so + hipblas.
          # install_chipstar.py --all stages all three into $CHIP_INSTALL.
          export ROCM_DIR=$CHIP_INSTALL
          # junit.py marks any non-empty stderr as a test failure; chipStar's
          # logWarn writes the harmless "unloaded HIP modules at program exit"
          # message at exit. Silencing it lets real failures stand out.
          export CHIP_LOGLEVEL=err

          cd ${{ runner.temp }}
          rm -rf libCEED
          git clone https://github.com/CEED/libCEED.git
          cd libCEED
          # libCEED's default OPT adds -fopenmp-simd; on chipStar's SPIR-V
          # target that trips clang's
          #   "OpenMP AMDGPU/NVPTX/SPIRV is only prepared to deal with
          #    device code" assertion in CodeGenModule.cpp.
          # Override OPT (without -fopenmp-simd) for the HIP build.
          OPT_NO_OMP="-O -march=native -g -ffp-contract=fast -fPIC"
          make FC= CC=hipcc CXX=hipcc OPT="$OPT_NO_OMP" \
            BACKENDS="/gpu/hip/ref /gpu/hip/shared /gpu/hip/gen" -j

          # The 'search' var is Make-pattern filtering (`%` wildcards), so
          # we enumerate every t<N> prefix we want to keep. BACKENDS must
          # also be passed to prove or it defaults to CPU backends we did
          # not build.
          #
          # Exclusions (all stem from the same root: intel/intel-graphics-
          # compiler#404 — IGC's SIMD32 RetryManager + DP emulation path
          # silently drops or miscompiles libCEED's basis kernels on Arc
          # A380. Fix is merged on IGC main as 3983c84 but not yet in a
          # tagged release picked up by the installed driver (IGC v2.30.1).
          # Re-enable once the installed IGC contains the fix):
          #
          # - t313, t314, t315, t316, t318 basis variants
          # - t351, t352, t354, t356, t357, t361, t365 basis variants
          # - ex1-volume, ex2-surface, ex3-volume (and -f Fortran variants)
          #   — these examples sweep all three /gpu/hip/{ref,shared,gen}
          #   backends and two of the three trip the same kernel drop.
          #
          # Some of the broken tests additionally crash libCEED's junit.py
          # harness with `UnicodeDecodeError: 'utf-8' codec can't decode
          # byte 0xf8` when chipStar/IGC writes non-UTF-8 bytes to stderr
          # on the error path — that is a separate issue but lives behind
          # the same root cause for now.
          KEEP="t0 t1 t2 t30 t310 t311 t312 t317 t319 t33 t34 t350 t353 t355 t358 t359 t360 t362 t363 t364 t37 t38 t39 t4 t5"
          make prove search="$KEEP" \
            BACKENDS="/gpu/hip/ref /gpu/hip/shared /gpu/hip/gen" -j4

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: libceed-test-logs
          path: ${{ runner.temp }}/libCEED/
          if-no-files-found: ignore

  # Stage 4: All other LLVM version tests (fan out in parallel)
  unit-tests-llvm-20-debug:
    needs: build-and-test-libceed
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh debug llvm-20
        shell: bash

  unit-tests-llvm-20-release:
    needs: build-and-test-libceed
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh release llvm-20
        shell: bash

  unit-tests-llvm-21-debug:
    needs: build-and-test-libceed
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh debug llvm-21
        shell: bash

  unit-tests-llvm-21-release:
    needs: build-and-test-libceed
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh release llvm-21
        shell: bash

  unit-tests-llvm-22-translator-debug:
    needs: build-and-test-libceed
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh debug llvm-22 --variant=translator
        shell: bash

  unit-tests-llvm-22-translator-release:
    needs: build-and-test-libceed
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh release llvm-22 --variant=translator
        shell: bash

  unit-tests-llvm-22-native-debug:
    needs: build-and-test-libceed
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'
      - name: Run unit test checking script
        run: ./scripts/unit_tests.sh debug llvm-22 --variant=native
        shell: bash
