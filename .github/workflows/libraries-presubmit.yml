name: Libraries Presubmit

on:
  pull_request:
    paths-ignore: "docs/**"

concurrency:
  group: libraries-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test-libraries-meatloaf:
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build chipStar + all libraries
        shell: bash
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native level-zero/dgpu
          module list

          STAGING=/tmp/chipstar-ci-staging/${{ github.event.pull_request.number }}
          rm -rf $STAGING

          ./install_chipstar.py --all \
            --with-tests \
            --install-dir $STAGING \
            --staging-dir $STAGING/staging \
            -j 8

          echo "STAGING=$STAGING" >> $GITHUB_ENV

      - name: Run library tests
        shell: bash
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native level-zero/dgpu

          # Find the chipStar install (date-stamped subdir)
          CHIP_INSTALL=$(ls -d $STAGING/chipStar/*/ | head -1)
          export PATH=$CHIP_INSTALL/bin:$PATH
          export LD_LIBRARY_PATH=$CHIP_INSTALL/lib:${LD_LIBRARY_PATH:-}
          export HIP_PATH=$CHIP_INSTALL
          export HIP_PLATFORM=spirv
          export CHIP_LOGLEVEL=err
          # Enable IGC software fp64 emulation on Intel Arc (Alchemist lacks native fp64)
          export IGC_EnableDPEmulation=1
          export OverrideDefaultFP64Settings=1

          # h4i-mklshim_batch_correctness_test SEGFAULTs on Intel Arc A380 and
          # causes ZE_RESULT_ERROR_DEVICE_LOST in subsequent tests. Root cause
          # is a crash in MKL batch LAPACK on this GPU. Exclude until fixed in
          # the H4I-MKLShim upstream.
          mkdir -p $STAGING/staging/H4I-MKLShim/.ci
          echo "h4i-mklshim_batch_correctness_test" \
            > $STAGING/staging/H4I-MKLShim/.ci/exclude.txt

          failed=0
          for lib_staging in $STAGING/staging/*/; do
            lib=$(basename $lib_staging)
            lib_build="$lib_staging/build"
            if [ ! -d "$lib_build" ]; then
              continue
            fi
            if [ -f "$lib_build/CTestTestfile.cmake" ]; then
              echo "=== Testing $lib ==="
              exclude=""
              exclude_file="$lib_staging/.ci/exclude.txt"
              if [ -f "$exclude_file" ]; then
                exclude=$(grep -Ev '^\s*(#|$)' "$exclude_file" | paste -sd '|' - || true)
              fi
              labels=""
              labels_file="$lib_staging/.ci/ctest-labels.txt"
              if [ -f "$labels_file" ]; then
                labels=$(grep -Ev '^\s*(#|$)' "$labels_file" | paste -sd '|' - || true)
              fi
              cd "$lib_build"
              if ! ctest --output-on-failure --timeout 1800 ${labels:+-L "$labels"} ${exclude:+-E "$exclude"}; then
                echo "::warning::$lib tests had failures"
                failed=$((failed + 1))
              fi
            else
              echo "=== $lib: no CTest tests ==="
            fi
          done
          if [ $failed -gt 0 ]; then
            echo "::error::$failed libraries had test failures"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: library-test-logs
          path: |
            /tmp/chipstar-ci-staging/${{ github.event.pull_request.number }}/staging/*/build/Testing/**/LastTest*.log
          if-no-files-found: ignore

  # chipFFT and chipBLAS are OpenCL-only and target hosts without Level Zero;
  # on this Intel runner the Level Zero loader is present (the H4I-* stack is
  # the recommended hipFFT/hipBLAS path here). install_chipstar.py detects
  # Level Zero and refuses to build the chipfft/chipblas components with a
  # clear pointer to H4I-HipFFT / H4I-HipBLAS. This job asserts that policy
  # holds — i.e. trying to install them here fails with the expected message.
  refuse-chipfft-chipblas-on-level-zero:
    runs-on: [self-hosted, Linux, X64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Assert install_chipstar.py refuses chipfft/chipblas on Level Zero host
        shell: bash
        run: |
          set -e
          if [ -f "$HOME/.local/init/bash" ]; then
            export MODULESHOME=$HOME/.local
            source "$MODULESHOME/init/bash"
          elif [ -f /etc/profile.d/lmod.sh ]; then
            source /etc/profile.d/lmod.sh
          else
            source /etc/profile.d/modules.sh
          fi
          module use /space/pvelesko/modulefiles
          module load oneapi/2025.0.4 llvm/22.0-native level-zero/dgpu

          OUT=$(mktemp)
          set +e
          ./install_chipstar.py -c chipfft,chipblas --dry-run > "$OUT" 2>&1
          rc=$?
          set -e
          echo "--- installer output (rc=$rc) ---"
          cat "$OUT"
          echo "--- end output ---"

          if [ "$rc" -eq 0 ]; then
            echo "::error::installer succeeded; expected refusal on Level Zero host"
            exit 1
          fi
          if ! grep -q "Level Zero was detected" "$OUT"; then
            echo "::error::installer did not print the expected Level Zero refusal message"
            exit 1
          fi
          if ! grep -q "Refusing to install: .*chipfft" "$OUT"; then
            echo "::error::installer did not list chipfft in refusal"
            exit 1
          fi
          if ! grep -q "Refusing to install: .*chipblas" "$OUT"; then
            echo "::error::installer did not list chipblas in refusal"
            exit 1
          fi
          echo "OK: refused as expected"

  # chipFFT + chipBLAS positive verification on macOS ARM64 (pastrami, PoCL).
  # No Level Zero on this host, so the OpenCL/CLBlast + OpenCL/VkFFT path
  # is the right hipFFT/hipBLAS implementation here. Mirrors the meatloaf
  # job's "install via install_chipstar.py, then ctest each staged build"
  # shape so library results stay consistent across hosts.
  build-and-test-libraries-pastrami:
    runs-on: [self-hosted, ARM64, MacOS]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build chipFFT and chipBLAS (PoCL)
        shell: /bin/bash {0}
        run: |
          set -e
          export PATH="/Users/paulius/.pyenv/shims:/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
          source /opt/homebrew/Cellar/modules/5.6.0/init/bash
          export MODULEPATH="/Users/paulius/modulefiles:$MODULEPATH"
          module load ocl-icd-loader
          module load pocl

          export LLVM_DIR=$HOME/install/llvm/22.0-native
          export PATH="${LLVM_DIR}/bin:$PATH"
          export SPIRV_TOOLS_PREFIX=$(brew --prefix spirv-tools)
          export CMAKE_PREFIX_PATH="${SPIRV_TOOLS_PREFIX}:${CMAKE_PREFIX_PATH:-}"

          # chipFFT and chipBLAS both set CMAKE_FIND_FRAMEWORK=NEVER on
          # Apple to dodge OpenCL.framework, so find_package(OpenCL) needs
          # an explicit pointer at the ocl-icd-loader prefix.
          export OpenCL_ROOT=/Users/paulius/install/ocl-icd-loader
          export CMAKE_LIBRARY_PATH=${OpenCL_ROOT}/lib:${CMAKE_LIBRARY_PATH:-}
          export CMAKE_INCLUDE_PATH=${OpenCL_ROOT}/include:${CMAKE_INCLUDE_PATH:-}
          export SDKROOT=$(xcrun --show-sdk-path)

          STAGING=${{ runner.temp }}/chipstar-ci-staging/${{ github.event.pull_request.number }}
          rm -rf $STAGING

          ./install_chipstar.py -c chipfft,chipblas \
            --with-tests \
            --install-dir $STAGING \
            --staging-dir $STAGING/staging \
            -j 4

          echo "STAGING=$STAGING" >> $GITHUB_ENV

      - name: Run library tests
        shell: /bin/bash {0}
        run: |
          set -e
          export PATH="/Users/paulius/.pyenv/shims:/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
          source /opt/homebrew/Cellar/modules/5.6.0/init/bash
          export MODULEPATH="/Users/paulius/modulefiles:$MODULEPATH"
          module load ocl-icd-loader
          module load pocl

          CHIP_INSTALL=$(ls -d $STAGING/chipStar/*/ | head -1)
          export PATH=$CHIP_INSTALL/bin:$PATH
          export DYLD_LIBRARY_PATH=$CHIP_INSTALL/lib:${DYLD_LIBRARY_PATH:-}
          export HIP_PATH=$CHIP_INSTALL
          export HIP_PLATFORM=spirv
          export CHIP_LOGLEVEL=err
          # PoCL on Apple Silicon (CPU device) has no fp16 OpenCL kernels, so
          # CLBlast errors out on hipblasH* calls. The chipBLAS api_surface
          # test honors this env var to skip the half-precision section.
          export CHIPBLAS_SKIP_HALF_API_SURFACE=1

          failed=0
          for lib_staging in $STAGING/staging/*/; do
            lib=$(basename $lib_staging)
            lib_build="$lib_staging/build"
            if [ ! -d "$lib_build" ]; then
              continue
            fi
            if [ -f "$lib_build/CTestTestfile.cmake" ]; then
              echo "=== Testing $lib ==="
              exclude=""
              exclude_file="$lib_staging/.ci/exclude.txt"
              if [ -f "$exclude_file" ]; then
                exclude=$(grep -Ev '^\s*(#|$)' "$exclude_file" | paste -sd '|' - || true)
              fi
              labels=""
              labels_file="$lib_staging/.ci/ctest-labels.txt"
              if [ -f "$labels_file" ]; then
                labels=$(grep -Ev '^\s*(#|$)' "$labels_file" | paste -sd '|' - || true)
              fi
              cd "$lib_build"
              if ! ctest --output-on-failure --timeout 1800 ${labels:+-L "$labels"} ${exclude:+-E "$exclude"}; then
                echo "::warning::$lib tests had failures"
                failed=$((failed + 1))
              fi
            else
              echo "=== $lib: no CTest tests ==="
            fi
          done
          if [ $failed -gt 0 ]; then
            echo "::error::$failed libraries had test failures"
            exit 1
          fi
        timeout-minutes: 90

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: library-test-logs-pastrami
          path: |
            ${{ runner.temp }}/chipstar-ci-staging/${{ github.event.pull_request.number }}/staging/*/build/Testing/**/LastTest*.log
          if-no-files-found: ignore

  # chipFFT + chipBLAS positive verification on Linux ARM64 (salami, Mali-G52
  # via OpenCL). No Level Zero on this host. Same install-and-ctest shape
  # as the meatloaf and pastrami jobs.
  build-and-test-libraries-salami:
    runs-on: [self-hosted, Linux, ARM64]
    env:
      CHIP_MODULE_CACHE_DIR: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build chipFFT and chipBLAS (OpenCL)
        shell: bash
        run: |
          set -e
          export MODULESHOME=$HOME/.local
          source $MODULESHOME/init/bash 2>/dev/null || source /etc/profile.d/modules.sh
          module use ~/modulefiles
          module load llvm/21.0
          module list

          export LLVM_DIR=$(module show llvm/21.0 2>&1 | grep -E 'prepend-path\s+PATH' | awk '{print $NF}' | head -1 | xargs dirname)
          echo "LLVM_DIR=$LLVM_DIR"

          STAGING=/tmp/chipstar-ci-staging-salami/${{ github.event.pull_request.number }}
          rm -rf $STAGING

          ./install_chipstar.py -c chipfft,chipblas \
            --with-tests \
            --install-dir $STAGING \
            --staging-dir $STAGING/staging \
            -j $(nproc)

          echo "STAGING=$STAGING" >> $GITHUB_ENV

      - name: Run library tests
        shell: bash
        run: |
          set -e
          export MODULESHOME=$HOME/.local
          source $MODULESHOME/init/bash 2>/dev/null || source /etc/profile.d/modules.sh
          module use ~/modulefiles
          module load llvm/21.0

          CHIP_INSTALL=$(ls -d $STAGING/chipStar/*/ | head -1)
          export PATH=$CHIP_INSTALL/bin:$PATH
          export LD_LIBRARY_PATH=$CHIP_INSTALL/lib:${LD_LIBRARY_PATH:-}
          export HIP_PATH=$CHIP_INSTALL
          export HIP_PLATFORM=spirv
          export CHIP_LOGLEVEL=err

          failed=0
          for lib_staging in $STAGING/staging/*/; do
            lib=$(basename $lib_staging)
            lib_build="$lib_staging/build"
            if [ ! -d "$lib_build" ]; then
              continue
            fi
            if [ -f "$lib_build/CTestTestfile.cmake" ]; then
              echo "=== Testing $lib ==="
              exclude=""
              exclude_file="$lib_staging/.ci/exclude.txt"
              if [ -f "$exclude_file" ]; then
                exclude=$(grep -Ev '^\s*(#|$)' "$exclude_file" | paste -sd '|' - || true)
              fi
              labels=""
              labels_file="$lib_staging/.ci/ctest-labels.txt"
              if [ -f "$labels_file" ]; then
                labels=$(grep -Ev '^\s*(#|$)' "$labels_file" | paste -sd '|' - || true)
              fi
              cd "$lib_build"
              if ! ctest --output-on-failure --timeout 1800 ${labels:+-L "$labels"} ${exclude:+-E "$exclude"}; then
                echo "::warning::$lib tests had failures"
                failed=$((failed + 1))
              fi
            else
              echo "=== $lib: no CTest tests ==="
            fi
          done
          if [ $failed -gt 0 ]; then
            echo "::error::$failed libraries had test failures"
            exit 1
          fi
        timeout-minutes: 90

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: library-test-logs-salami
          path: |
            /tmp/chipstar-ci-staging-salami/${{ github.event.pull_request.number }}/staging/*/build/Testing/**/LastTest*.log
          if-no-files-found: ignore
